name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core & UI
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Permissions
  permission_handler: ^11.3.1

  # Audio: Switched to a modern, maintained package
  audioplayers: ^6.0.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
